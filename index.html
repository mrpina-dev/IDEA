<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="512x512" href="/IDEA/android-chrome-512x512.png">
<title>IDEA - We have moved</title>
<meta http-equiv="refresh" content="0; url=https://idea-app-sage.vercel.app/">
<link rel="canonical" href="https://idea-app-sage.vercel.app/">
<style>
:root {
  --bg0: #020A04;
  --green: #00FF41;
  --gold: #C8FF00;
  --dim: #4A7A52;
  --white: #E8FFE8;
  --glow-green: 0 0 10px rgba(0,255,65,0.8), 0 0 28px rgba(0,255,65,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg0);
  color: var(--white);
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.moved {
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  line-height: 1.8;
}
.moved a {
  color: var(--green);
  text-shadow: var(--glow-green);
  text-decoration: none;
  border-bottom: 1px solid rgba(0,255,65,0.4);
}
.moved a:hover { color: var(--gold); }
.moved .dim { color: var(--dim); }
</style>
</head>
<body>
<p class="moved">
  IDEA has moved.
  <span class="dim">If you are not redirected,</span>
  <a href="https://idea-app-sage.vercel.app/">open the new site</a>.
</p>
</body>
</html>
